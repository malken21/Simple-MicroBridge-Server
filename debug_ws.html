<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroBridge WebSocket Debugger</title>
    <style>
        :root {
            --xp-blue-dark: #0058e6;
            --xp-blue-light: #3a93ff;
            --xp-blue-title: linear-gradient(to bottom, #0058e6 0%, #3a93ff 10%, #0058e6 20%, #0058e6 85%, #0036ad 100%);
            --xp-bg: #ece9d8;
            --xp-window-border: #0054e3;
            --xp-button-bg: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            --xp-button-border: #003c74;
            --error-color: #ff0000;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            background-color: #316ac5;
            /* Windows XP Default Desktop Color */
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        .window {
            background-color: var(--xp-bg);
            border: 3px solid var(--xp-window-border);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .title-bar {
            background: var(--xp-blue-title);
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 1px #000;
            height: 25px;
        }

        .title-bar-text {
            font-size: 13px;
        }

        .window-content {
            padding: 12px;
        }

        .status-panel {
            background-color: #fff;
            border: 1px inset #808080;
            padding: 4px 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border: 1px solid #000;
            background-color: #ccc;
        }

        .dot.connected {
            background-color: #0f0;
            box-shadow: 0 0 4px #0f0;
        }

        .dot.disconnected {
            background-color: #f00;
        }

        .log-container {
            background-color: #fff;
            color: #000;
            font-family: 'Courier New', monospace;
            padding: 6px;
            border: 2px inset #808080;
            height: 400px;
            overflow-y: scroll;
            font-size: 12px;
            line-height: 1.2;
        }

        .log-entry {
            margin-bottom: 2px;
            border-bottom: 1px solid #f0f0f0;
        }

        .log-time {
            color: #0000ff;
            margin-right: 4px;
        }

        .controls {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        button.xp-button {
            padding: 4px 16px;
            border: 1px solid var(--xp-button-border);
            border-radius: 3px;
            background: var(--xp-button-bg);
            color: #000;
            font-family: 'Tahoma', sans-serif;
            font-size: 12px;
            cursor: pointer;
            box-shadow: inset -1px -1px 1px #808080, inset 1px 1px 1px #fff;
        }

        button.xp-button:active {
            box-shadow: inset 1px 1px 1px #808080, inset -1px -1px 1px #fff;
            padding: 5px 15px 3px 17px;
        }

        button.xp-button:disabled {
            color: #808080;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">MicroBridge WebSocket Debugger</div>

        </div>
        <div class="window-content">
            <div class="status-panel">
                <div class="status-indicator">
                    <div id="status-dot" class="dot"></div>
                    <span id="status-text">Disconnected</span>
                </div>
                <div>
                    Port: <span id="port-display">4000</span>
                </div>
            </div>

            <div id="log" class="log-container">
                <div class="log-entry">Waiting for connection...</div>
            </div>

            <div class="controls">
                <button id="connect-btn" class="xp-button">Connect</button>
                <button id="clear-btn" class="xp-button">Clear Logs</button>
            </div>
        </div>
    </div>

    <script>
        const logContainer = document.getElementById('log');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const connectBtn = document.getElementById('connect-btn');
        const clearBtn = document.getElementById('clear-btn');

        let ws = null;

        function addLog(message, isError = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.textContent = `[${new Date().toLocaleTimeString()}] `;

            const messageSpan = document.createElement('span');
            if (isError) {
                messageSpan.style.color = 'var(--error-color)';
            }
            messageSpan.textContent = message;

            entry.appendChild(timeSpan);
            entry.appendChild(messageSpan);
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function connect() {
            if (ws) ws.close();

            addLog('Connecting to ws://localhost:4000...');
            ws = new WebSocket('ws://localhost:4000');

            ws.onopen = () => {
                statusDot.className = 'dot connected';
                statusText.innerText = 'Connected';
                connectBtn.innerText = 'Disconnect';
                addLog('WebSocket connection established.');
            };

            ws.onclose = () => {
                statusDot.className = 'dot disconnected';
                statusText.innerText = 'Disconnected';
                connectBtn.innerText = 'Connect';
                addLog('WebSocket connection closed.');
                ws = null;
            };

            ws.onerror = (error) => {
                addLog('Error: Connection failed. Ensure MicroBridge is running.', true);
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    event.data.text().then(text => {
                        addLog(`Received (Binary/Blob): ${text}`);
                    });
                } else {
                    addLog(`Received: ${event.data}`);
                }
            };
        }

        connectBtn.onclick = () => {
            if (ws) {
                ws.close();
            } else {
                connect();
            }
        };

        clearBtn.onclick = () => {
            logContainer.innerHTML = '';
        };
    </script>
</body>

</html>

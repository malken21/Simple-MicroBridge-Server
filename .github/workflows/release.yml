name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Release - ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: simple-microbridge-server-linux-x64
          - os: windows-latest
            asset_name: simple-microbridge-server-windows-x64.exe
          - os: ubuntu-24.04-arm
            asset_name: simple-microbridge-server-linux-arm64
          - os: windows-11-arm
            asset_name: simple-microbridge-server-windows-arm64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Build
        run: cargo build --release --verbose

      - name: Get Binary Path
        id: bin
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=target/release/Simple-MicroBridge-Server.exe" >> $GITHUB_OUTPUT
          else
            echo "path=target/release/Simple-MicroBridge-Server" >> $GITHUB_OUTPUT
          fi

      - name: Rename Binary for Release
        shell: bash
        run: |
          cp ${{ steps.bin.outputs.path }} ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
